# This file is the committed default template.
# Put machine-specific overrides in bridge/config/wingpu.local.toml.

[paths]
remote_home = "/home/your-wsl-user"
remote_src_root = "{remote_home}/src"
remote_models_root = "{remote_home}/models/Qwen"

[connection]
host = "gpu-host"
distro = "Ubuntu"
api_key = "local-dev-key"
local_port = 8000
remote_port = 8000
ssh_connect_timeout = 8
server_alive_interval = 30
server_alive_count_max = 3

[runtime_defaults]
default_runtime = "turboquant-cuda"
served_model_name = "qwen-local"
n_gpu_layers = 99
threads = 8
startup_timeout_seconds = 240
build_jobs = 8
cuda_architectures = "89"
flash_attn = true
remote_state_dir = "~/.gpu-bridge"
default_cache_type_k = "turbo3_0"
default_cache_type_v = "turbo3_0"
cmake_args = [
  "-DGGML_CUDA=ON",
  "-DGGML_NATIVE=OFF",
  "-DGGML_CUDA_FA_ALL_QUANTS=ON",
]
build_targets = ["llama-server", "llama-bench"]
extra_server_args = []

[runtimes.upstream]
kind = "native"
source_dir = "{remote_src_root}/llama.cpp"
build_dir = "{remote_src_root}/llama.cpp/build-cuda89"
server_bin = "{remote_src_root}/llama.cpp/build-cuda89/bin/llama-server"
bench_bin = "{remote_src_root}/llama.cpp/build-cuda89/bin/llama-bench"
default_branch = "master"
supported_cache_types = ["f16", "bf16", "q8_0", "q4_0", "q4_1"]
extra_server_args = []
notes = "Upstream llama.cpp CUDA baseline."

[runtimes."turboquant-cuda"]
kind = "native"
source_dir = "{remote_src_root}/llama-cpp-turboquant-cuda"
build_dir = "{remote_src_root}/llama-cpp-turboquant-cuda/build-cuda89"
server_bin = "{remote_src_root}/llama-cpp-turboquant-cuda/build-cuda89/bin/llama-server"
bench_bin = "{remote_src_root}/llama-cpp-turboquant-cuda/build-cuda89/bin/llama-bench"
default_branch = "feature/turboquant-kv-cache"
supported_cache_types = ["f16", "bf16", "q8_0", "q4_0", "q4_1", "turbo2_0", "turbo3_0", "turbo4_0", "turbo2", "turbo3", "turbo4"]
extra_server_args = []
notes = "spiritbuun CUDA-focused TurboQuant fork on feature/turboquant-kv-cache."

[state]
state_dir = "~/.gpu-chat-bridge"
selected_model_file = "selected_model"
selected_runtime_file = "selected_runtime"
selected_cache_type_k_file = "selected_cache_type_k"
selected_cache_type_v_file = "selected_cache_type_v"
benchmark_dir_name = "benchmarks"
restart_on_model_set = false
